[profiles]
default = ["server", "front", "fail"]
backend = ["server"]
none = []

[processes.server]
name = "Web server"
command = "echo 'Starting server on :3000...' && echo 'Listening for connections' && while true; do echo \"$(date) - GET /api/health 200 OK\"; sleep 2; done"

[processes.front]
name = "Frontend"
command = "echo 'Tailwind CSS watcher started' && while true; do echo \"$(date) - Rebuilding styles...\"; sleep 3; done"

[processes.db]
name = "Database"
command = "echo 'PostgreSQL starting...' && echo 'Ready to accept connections on port 5432' && while true; do echo \"$(date) - checkpoint complete\"; sleep 5; done"

[processes.fail]
name = "This will fail"
command = "exit 42"

[processes.short]
name = "This will exit immediately"
command = "echo plop"

[processes.stubborn]
name = "Stubborn (ignores SIGTERM for 10s)"
command = "trap 'echo \"SIGTERM received, but I will not die yet...\"; sleep 10; echo \"OK fine, bye.\"; exit 0' TERM; echo 'Running... try to stop me!'; while true; do echo \"$(date) - still alive\"; sleep 1; done"

[processes.rainbow]
name = "Rainbow"
command = "while true; do echo -e '\\033[31m[ERROR]\\033[0m Something broke | \\033[32m[OK]\\033[0m All good | \\033[33m[WARN]\\033[0m Watch out | \\033[34m[INFO]\\033[0m Just FYI | \\033[35m[DEBUG]\\033[0m Verbose | \\033[36m[TRACE]\\033[0m Deep dive'; sleep 1; done"
